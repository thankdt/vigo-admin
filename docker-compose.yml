services:
  admin:
    build:
      context: .
      target: development
    ports:
      - "9002:9002"
    environment:
      # Admin (browser) → dev backend. next dev reads this at runtime; prod
      # builds fall back to the hardcoded prod URL in src/lib/api.ts.
      - NEXT_PUBLIC_API_BASE_URL=https://api.vigodev.site
    volumes:
      - .:/app
      - /app/node_modules   # keep image's installed deps
      - /app/.next          # keep dev build cache out of the bind mount
    restart: unless-stopped
    networks:
      - vigo-shared

# Reuse the backend stack's network so its EXISTING cloudflared can reach this
# container. The route admin.vigodev.site → http://admin:9002 lives on the same
# tunnel as api.vigodev.site (no separate tunnel/cloudflared needed here).
networks:
  vigo-shared:
    external: true
    name: vigo-backend_vigo-network
