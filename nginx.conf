server {
    listen 9002;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the immutable hashed build assets.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Portal subdomains served from the SAME admin static build (mirrors the
    # prod CloudFront subdomain rewrites). Only the root path is rewritten;
    # deeper paths (/htx/*, /kol-portal/*, /agent-portal/*, /_next/*, assets)
    # fall through, and admin.* serves the admin root unchanged.
    #   htx.<domain>    → /htx                 (bare entry redirects to login/dashboard)
    #   kol.<domain>    → /kol-portal/login    (no bare entry → land on login)
    #   daily.<domain>  → /agent-portal/login  (đại lý đặt hộ portal; no bare entry → login)
    location = / {
        if ($host ~* ^htx\.) { rewrite ^ /htx/ last; }
        if ($host ~* ^kol\.) { rewrite ^ /kol-portal/login/ last; }
        if ($host ~* ^daily\.) { rewrite ^ /agent-portal/login/ last; }
        try_files /index.html =404;
    }

    # Next static export (trailingSlash: true): serve the exact file, then the
    # directory's index.html, then the .html variant, else SPA-fallback to
    # index.html — mirrors the prod S3 ErrorDocument=index.html behaviour so
    # client-side routes / dynamic [id] pages resolve.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
