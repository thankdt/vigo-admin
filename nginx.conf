server {
    listen 9002;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the immutable hashed build assets.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # htx.<domain> is the cooperative-owner (HTX) portal, served from the SAME
    # admin static build. Its root serves the /htx entry — mirrors the prod
    # CloudFront subdomain rewrite (htx.vigogroup.vn → /htx). Deeper paths
    # (/htx/*, /_next/*, other assets) fall through to the normal handler, and
    # the admin subdomain serves the admin root unchanged.
    location = / {
        if ($host ~* ^htx\.) { rewrite ^ /htx/ last; }
        try_files /index.html =404;
    }

    # Next static export (trailingSlash: true): serve the exact file, then the
    # directory's index.html, then the .html variant, else SPA-fallback to
    # index.html — mirrors the prod S3 ErrorDocument=index.html behaviour so
    # client-side routes / dynamic [id] pages resolve.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
